server.port=8081

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_URL}
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://postgres:5432/microfinancehub_client}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway desactive
spring.flyway.enabled=false

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

# Même noms que auth-service (publisher/consumer du même event)
rabbitmq.queue.user-login=user.login.queue
rabbitmq.exchange.user-events=user.events.exchange
rabbitmq.routing-key.user-login=user.login

# Auth Service URL
auth.service.url=http://auth-service:8080

# Redis (pour le rate limiting)
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=6379

# JWT
jwt.secret=${JWT_SECRET}

# Upload documents
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
app.upload.dir=uploads
app.service.base-url=http://client-service:8081

# Management
management.endpoints.web.exposure.include=health,info,metrics

# Logging
logging.level.org.example.clientservice=DEBUG
logging.level.org.springframework.security=INFO

server.port=8086

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_URL}
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://postgres:5432/microfinancehub_agency}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000

# JPA — update crée les tables automatiquement en dev (pas besoin de migrations Flyway manuelles)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway désactivé tant que les scripts de migration ne sont pas écrits
spring.flyway.enabled=false

# Auth Service URL
auth.service.url=http://auth-service:8080

# JWT (même secret partagé dans tous les services)
jwt.secret=${JWT_SECRET}

# Token interne service-à-service
internal.api.token=${INTERNAL_API_TOKEN}

# Logging
logging.level.org.example.agencyservice=DEBUG
logging.level.org.springframework.security=INFO

# Management
management.endpoints.web.exposure.include=health,info,metrics

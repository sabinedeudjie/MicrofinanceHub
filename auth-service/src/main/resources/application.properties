spring.application.name=auth-service
server.port=8080

spring.cloud.config.uri=${CONFIG_SERVER_URL:http://config-service:8000}
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://config-service:8000}

# Charger le .env depuis la racine du projet
dotenv.directory=../

# Base de données
# Base de données
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/microfinancehub_auth}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# Email SMTP (Brevo)
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# JWT
jwt.secret=${JWT_SECRET:}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Adresse expéditeur des emails (doit être validée dans Brevo)
app.mail.from=${MAIL_FROM:aa61af001@smtp-brevo.com}

# Frontend URL (pour les liens dans les emails)
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true

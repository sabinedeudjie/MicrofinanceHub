server.port=8080

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_URL}
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://postgres:5432/microfinancehub_auth}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=false

# Redis
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=6379

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

# Noms des queues/exchanges/routing-keys (utilisés dans RabbitMQConfig et UserLoginEventPublisher)
rabbitmq.queue.user-login=user.login.queue
rabbitmq.exchange.user-events=user.events.exchange
rabbitmq.routing-key.user-login=user.login

# Client Service URL
client.service.url=http://client-service:8081

# Admin par defaut
app.admin.email=${ADMIN_EMAIL}
app.admin.password=${ADMIN_PASSWORD}

# Adresse expéditeur (doit être validée dans Brevo)
app.mail.from=${MAIL_FROM:aa61af001@smtp-brevo.com}

# Frontend URL (pour les liens dans les emails)
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# SMTP (Brevo)
spring.mail.host=${MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:aa61af001@smtp-brevo.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# Management
management.endpoints.web.exposure.include=health,info,metrics

# Logging
logging.level.org.example.authservice=DEBUG
logging.level.org.springframework.security=INFO
